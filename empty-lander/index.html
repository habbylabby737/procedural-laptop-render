<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Empty Lander</title>
<style>
:root{color-scheme:dark;--ink:#f3ead8;--muted:#b9ad99;--amber:#f0a85a;--deep:#03050a}*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:var(--deep);color:var(--ink);font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}canvas{display:block;width:100vw;height:100vh;background:#03050a}.hud{position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle at 62% 62%,rgba(240,168,90,.11),transparent 18%),radial-gradient(circle at 50% 105%,rgba(13,21,33,.2),transparent 36%),linear-gradient(180deg,rgba(2,4,8,.08),rgba(2,4,8,.32))}.title{position:fixed;left:clamp(18px,4vw,44px);top:clamp(18px,4vw,36px);max-width:min(440px,calc(100vw - 36px));text-shadow:0 2px 18px #000}h1{margin:0 0 8px;font-family:Georgia,"Times New Roman",serif;font-size:clamp(30px,5vw,64px);font-weight:400;line-height:.95;letter-spacing:0}.title p{margin:0;color:var(--muted);font-size:clamp(13px,1.5vw,16px);line-height:1.45}.panel{position:fixed;left:clamp(18px,4vw,44px);bottom:clamp(18px,4vw,36px);width:min(390px,calc(100vw - 36px));display:grid;gap:10px;color:var(--ink);text-shadow:0 2px 12px #000}.readout{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.cell{min-height:54px;border:1px solid rgba(243,234,216,.18);background:rgba(5,8,13,.56);backdrop-filter:blur(8px);border-radius:8px;padding:9px 10px}.cell strong{display:block;font-size:18px;line-height:1}.cell span{display:block;margin-top:5px;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.08em}.controls{border:1px solid rgba(243,234,216,.18);background:rgba(5,8,13,.56);backdrop-filter:blur(8px);border-radius:8px;padding:11px 12px;color:var(--muted);font-size:13px;line-height:1.45}@media(max-width:720px){.title{top:16px}.title p{max-width:300px}.panel{bottom:14px}.cell{min-height:46px;padding:7px 8px}.cell strong{font-size:15px}.controls{font-size:12px}}
</style>
</head>
<body>
<canvas id="scene" aria-label="A quiet night clearing with an empty landed craft under two moons"></canvas>
<div class="hud" aria-hidden="true"></div>
<section class="title"><h1>The Empty Lander</h1><p>A silent survey craft. One warm hatch. Two wrong moons above a cold clearing.</p></section>
<section class="panel" aria-label="Game status"><div class="readout"><div class="cell"><strong id="dist">42m</strong><span>hatch</span></div><div class="cell"><strong id="signal">weak</strong><span>signal</span></div><div class="cell"><strong id="mode">walk</strong><span>mode</span></div></div><div class="controls">Move with WASD or arrow keys. Reach the hatch glow. Press R to reset.</div></section>
<script>
const canvas=document.querySelector('#scene'),ctx=canvas.getContext('2d'),distEl=document.querySelector('#dist'),signalEl=document.querySelector('#signal'),modeEl=document.querySelector('#mode'),keys=new Set(),player={x:-120,y:90},hatch={x:96,y:26};let t=0;addEventListener('keydown',e=>{if(e.key.toLowerCase()==='r'){player.x=-120;player.y=90}keys.add(e.key.toLowerCase())});addEventListener('keyup',e=>keys.delete(e.key.toLowerCase()));addEventListener('resize',resize);resize();requestAnimationFrame(loop);
function resize(){const s=Math.min(devicePixelRatio||1,2);canvas.width=Math.floor(innerWidth*s);canvas.height=Math.floor(innerHeight*s);ctx.setTransform(s,0,0,s,0,0)}
function loop(now){t=now/1000;update();draw();requestAnimationFrame(loop)}
function update(){const speed=1.55,left=keys.has('a')||keys.has('arrowleft'),right=keys.has('d')||keys.has('arrowright'),up=keys.has('w')||keys.has('arrowup'),down=keys.has('s')||keys.has('arrowdown');player.x+=(right-left)*speed;player.y+=(down-up)*speed;player.x=Math.max(-260,Math.min(250,player.x));player.y=Math.max(-35,Math.min(155,player.y));const d=Math.hypot(player.x-hatch.x,player.y-hatch.y);distEl.textContent=`${Math.max(0,Math.round(d/5))}m`;signalEl.textContent=d<34?'open':d<85?'clear':'weak';modeEl.textContent=d<34?'hatch':'walk'}
function draw(){const w=innerWidth,h=innerHeight;ctx.clearRect(0,0,w,h);sky(w,h);ground(w,h);world(w,h);vignette(w,h)}
function sky(w,h){const g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,'#07111f');g.addColorStop(.58,'#071018');g.addColorStop(1,'#03050a');ctx.fillStyle=g;ctx.fillRect(0,0,w,h);for(let i=0;i<110;i++){const x=i*193%w,y=i*71%Math.max(1,h*.58)+8,a=.22+.34*Math.sin(t*.35+i);ctx.fillStyle=`rgba(214,230,245,${a})`;ctx.fillRect(x,y,i%7===0?1.7:1,1)}moon(w*.72,h*.15,34,'#d8d0ba',.82,-8);moon(w*.81,h*.22,22,'#9db9ce',.7,7)}
function moon(x,y,r,color,alpha,bite){ctx.save();ctx.globalAlpha=alpha;ctx.shadowColor=color;ctx.shadowBlur=28;ctx.fillStyle=color;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.globalCompositeOperation='destination-out';ctx.beginPath();ctx.arc(x+bite,y-2,r*.82,0,Math.PI*2);ctx.fill();ctx.restore()}
function ground(w,h){const horizon=h*.58,g=ctx.createLinearGradient(0,horizon,0,h);g.addColorStop(0,'#0b1820');g.addColorStop(1,'#06100e');ctx.fillStyle=g;ctx.fillRect(0,horizon,w,h-horizon);ctx.fillStyle='rgba(7,13,12,.8)';for(let x=-40;x<w+40;x+=26){const ht=48+32*Math.sin(x*.017);ctx.beginPath();ctx.moveTo(x,horizon+6);ctx.lineTo(x+13,horizon-ht);ctx.lineTo(x+28,horizon+8);ctx.closePath();ctx.fill()}}
function world(w,h){const ox=w/2,oy=h*.64,sx=1.08,sy=.72,wx=x=>ox+x*sx,wy=y=>oy+y*sy;ctx.save();ctx.translate(wx(hatch.x),wy(hatch.y));glow(0,24,118,'rgba(240,168,90,.45)');ctx.restore();drawLander(wx(hatch.x),wy(hatch.y));drawPlayer(wx(player.x),wy(player.y));ctx.strokeStyle='rgba(240,168,90,.28)';ctx.lineWidth=1;ctx.setLineDash([5,9]);ctx.beginPath();ctx.moveTo(wx(player.x),wy(player.y));ctx.lineTo(wx(hatch.x),wy(hatch.y+18));ctx.stroke();ctx.setLineDash([])}
function drawLander(x,y){ctx.save();ctx.translate(x,y);ctx.shadowColor='rgba(0,0,0,.8)';ctx.shadowBlur=28;ctx.fillStyle='#101820';ctx.beginPath();ctx.ellipse(0,10,92,27,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#1a2630';ctx.beginPath();ctx.ellipse(-2,-18,70,32,0,Math.PI,0);ctx.lineTo(68,10);ctx.lineTo(-70,10);ctx.closePath();ctx.fill();ctx.strokeStyle='rgba(220,232,235,.18)';ctx.lineWidth=2;ctx.stroke();ctx.fillStyle='#ef9f52';ctx.shadowColor='#ef9f52';ctx.shadowBlur=22;ctx.fillRect(32,-8,18,24);ctx.shadowBlur=0;ctx.strokeStyle='#081014';ctx.strokeRect(32,-8,18,24);ctx.strokeStyle='rgba(243,234,216,.28)';ctx.beginPath();ctx.moveTo(-56,15);ctx.lineTo(-86,52);ctx.moveTo(56,15);ctx.lineTo(86,52);ctx.stroke();ctx.restore()}
function drawPlayer(x,y){ctx.save();ctx.translate(x,y);glow(0,0,34,'rgba(129,183,218,.22)');ctx.fillStyle='#d9e9ef';ctx.beginPath();ctx.arc(0,-12,6,0,Math.PI*2);ctx.fill();ctx.fillRect(-5,-7,10,24);ctx.strokeStyle='#d9e9ef';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(-5,16);ctx.lineTo(-12,28);ctx.moveTo(5,16);ctx.lineTo(12,28);ctx.stroke();ctx.restore()}
function glow(x,y,r,color){const g=ctx.createRadialGradient(x,y,0,x,y,r);g.addColorStop(0,color);g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill()}
function vignette(w,h){const g=ctx.createRadialGradient(w/2,h*.55,Math.min(w,h)*.18,w/2,h/2,Math.max(w,h)*.72);g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(0,0,0,.68)');ctx.fillStyle=g;ctx.fillRect(0,0,w,h)}
</script>
</body>
</html>
